<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>間時提取訓練工具</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      line-height: 1.6;
      background: #f8fafc;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-size: 1.2rem;
      margin-top: 1.5rem;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 8px;
      box-sizing: border-box;
      border-radius: 4px;
      border: 1px solid #cbd5e1;
      resize: vertical;
      font-size: 14px;
    }
    .controls {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 14px;
    }
    button.secondary {
      background: #6b7280;
    }
    button.danger {
      background: #dc2626;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .section {
      background: white;
      padding: 12px 16px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .label {
      font-weight: 600;
    }
    .timer {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 4px;
    }
    .status {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #64748b;
    }
    .hidden {
      display: none;
    }
    .feedback-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      background: #e5e7eb;
      color: #374151;
    }
    .pill.success {
      background: #dcfce7;
      color: #166534;
    }
    .pill.fail {
      background: #fee2e2;
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <h1>間時提取訓練工具</h1>
  <p style="font-size:0.9rem;color:#6b7280;">
    流程：輸入要記的內容 → 按「儲存並開始」 → 計時中看不到答案 → 計時結束先自己回想 → 再按「顯示內容」確認 → 回饋成功或失敗 → 自動排程下一次。
  </p>

  <!-- 輸入與設定區 -->
  <div class="section">
    <h2>1. 輸入要記的內容</h2>
    <div id="inputBlock">
      <textarea id="contentInput" placeholder="在這裡輸入你想記住的內容，例如單字、公式、概念、重點摘要..."></textarea>
      <div class="controls">
        <button id="saveContentBtn">儲存內容並開始計時</button>
      </div>
      <div class="status" id="saveStatus"></div>
    </div>
    <div id="inputHiddenMsg" class="status hidden" style="color:#b91c1c;">
      計時中與回想階段不顯示答案。下一輪計時完成後會再提示你回想。
    </div>
  </div>

  <!-- 計時與回想區 -->
  <div class="section">
    <h2>2. 間時提取練習</h2>
    <div>
      <div class="label">現在狀態：</div>
      <div id="statusText" class="status">尚未開始，請先輸入內容並按「儲存內容並開始計時」。</div>

      <div class="timer" id="timerDisplay">--:--</div>
      <div class="status" id="nextTimeInfo"></div>
    </div>

    <div class="controls">
      <button id="stopTimerBtn" class="secondary" disabled>停止計時</button>
    </div>

    <div id="recallPrompt" class="hidden" style="margin-top:12px;">
      <div class="label">計時結束！</div>
      <p style="margin:4px 0;">
        請先在腦中 <strong>自己回想</strong> 剛才輸入的內容。回想完再按下面的按鈕：
      </p>
      <button id="showContentBtn" class="secondary">顯示內容，檢查回想結果</button>
    </div>

    <div id="contentReview" class="hidden" style="margin-top:12px;">
      <div class="label">原始內容：</div>
      <div id="contentDisplay" style="white-space:pre-wrap;border:1px solid #e5e7eb;border-radius:4px;padding:8px;margin-top:4px;background:#f9fafb;"></div>

      <div class="feedback-buttons">
        <button id="successBtn" style="background:#16a34a;">成功記起</button>
        <button id="failBtn" class="danger">沒有或大部分沒記起</button>
      </div>
      <div class="status" id="feedbackHint">
        成功：拉長下次間隔 / 失敗：縮短間隔再練一次。
      </div>
    </div>
  </div>

  <!-- 歷史與排程資訊 -->
  <div class="section">
    <h2>3. 訓練紀錄（單一項目）</h2>
    <div id="historyInfo" class="status">
      尚無紀錄。
    </div>
  </div>

  <script>
    // --- 間隔設計 ---
    // 固定序列（分鐘）：0.5, 1, 3, 5, 10, 20, 40, 90, 210
    // 之後每次成功回憶就把上一個間隔加倍，直到封頂 7 天（10080 分鐘）
    const BASE_INTERVALS = [0.5, 1, 3, 5, 10, 20, 40, 90, 210];
    const MAX_MINUTES = 10080; // 7 天
    const STORAGE_KEY = "spaced_recall_item_v2";

    const contentInput = document.getElementById("contentInput");
    const saveContentBtn = document.getElementById("saveContentBtn");
    const saveStatus = document.getElementById("saveStatus");
    const inputBlock = document.getElementById("inputBlock");
    const inputHiddenMsg = document.getElementById("inputHiddenMsg");

    const stopTimerBtn = document.getElementById("stopTimerBtn");
    const timerDisplay = document.getElementById("timerDisplay");
    const statusText = document.getElementById("statusText");
    const nextTimeInfo = document.getElementById("nextTimeInfo");

    const recallPrompt = document.getElementById("recallPrompt");
    const showContentBtn = document.getElementById("showContentBtn");
    const contentReview = document.getElementById("contentReview");
    const contentDisplay = document.getElementById("contentDisplay");
    const successBtn = document.getElementById("successBtn");
    const failBtn = document.getElementById("failBtn");

    const historyInfo = document.getElementById("historyInfo");

    let currentTimerId = null;
    // item: { content, level, nextTime, lastResult, lastReviewedAt }
    let currentItem = null;

    function loadItem() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    function saveItem(item) {
      currentItem = item;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(item));
      updateUIFromItem();
    }

    function formatDateTime(ts) {
      if (!ts) return "--";
      const d = new Date(ts);
      return d.toLocaleString();
    }

    function formatDuration(ms) {
      if (ms <= 0) return "0 秒";
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      if (minutes <= 0) return seconds + " 秒";
      return minutes + " 分 " + seconds + " 秒";
    }

    function updateTimerDisplay(remainingMs) {
      if (remainingMs <= 0) {
        timerDisplay.textContent = "00:00";
        return;
      }
      const totalSeconds = Math.floor(remainingMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      timerDisplay.textContent =
        String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    }

    function clearTimer() {
      if (currentTimerId) {
        clearInterval(currentTimerId);
        currentTimerId = null;
      }
    }

    function startCountdownUntil(nextTime) {
      clearTimer();
      const update = () => {
        const now = Date.now();
        const remaining = nextTime - now;
        if (remaining <= 0) {
          clearTimer();
          updateTimerDisplay(0);
          onTimerFinished();
        } else {
          updateTimerDisplay(remaining);
        }
      };
      update();
      currentTimerId = setInterval(update, 1000);
    }

    // 計時結束時的處理：隱藏輸入/答案，只顯示回想提示
    function onTimerFinished() {
      statusText.textContent = "到了回想時間！請先在腦中回想內容。";
      nextTimeInfo.textContent = "";
      recallPrompt.classList.remove("hidden");
      contentReview.classList.add("hidden");
      // 保持輸入區隱藏，答案不顯示
      inputBlock.classList.add("hidden");
      inputHiddenMsg.classList.remove("hidden");
      stopTimerBtn.disabled = true;
    }

    function updateHistoryInfo(item) {
      if (!item) {
        historyInfo.textContent = "尚無紀錄。";
        return;
      }
      const lastResult =
        item.lastResult === "success"
          ? '<span class="pill success">上次：成功記起</span>'
          : item.lastResult === "fail"
          ? '<span class="pill fail">上次：沒記起</span>'
          : "尚未回饋";

      historyInfo.innerHTML = `
        <div>目前熟悉等級：<strong>${item.level}</strong></div>
        <div>上次練習時間：${formatDateTime(item.lastReviewedAt)}</div>
        <div>下次提醒時間：${formatDateTime(item.nextTime)}</div>
        <div style="margin-top:4px;">${lastResult}</div>
      `;
    }

    function updateUIFromItem() {
      const item = currentItem;
      if (!item) {
        statusText.textContent =
          "尚未開始，請先輸入內容並按「儲存內容並開始計時」。";
        timerDisplay.textContent = "--:--";
        nextTimeInfo.textContent = "";
        recallPrompt.classList.add("hidden");
        contentReview.classList.add("hidden");
        inputBlock.classList.remove("hidden");
        inputHiddenMsg.classList.add("hidden");
        stopTimerBtn.disabled = true;
        updateHistoryInfo(null);
        return;
      }

      // 內容只在輸入階段顯示在 textarea，回想階段不顯示
      contentInput.value = item.content || "";
      contentDisplay.textContent = item.content || "";

      const now = Date.now();
      if (item.nextTime && item.nextTime > now) {
        const remainingMs = item.nextTime - now;
        statusText.textContent =
          "已排程下一次回想。計時中，請不要看答案。";
        nextTimeInfo.textContent =
          "距離下一次回想還有：約 " + formatDuration(remainingMs);
        startCountdownUntil(item.nextTime);
        recallPrompt.classList.add("hidden");
        contentReview.classList.add("hidden");

        // 計時期間隱藏輸入區（避免偷看）
        inputBlock.classList.add("hidden");
        inputHiddenMsg.classList.remove("hidden");
        stopTimerBtn.disabled = false;
      } else if (item.nextTime && item.nextTime <= now) {
        // 已到了回想時間（例如重開網頁時）
        timerDisplay.textContent = "00:00";
        onTimerFinished();
      } else {
        // 尚未排程（剛建立或停止）
        statusText.textContent =
          "尚未計時。按上面的「儲存內容並開始計時」會啟動下一輪。";
        timerDisplay.textContent = "--:--";
        nextTimeInfo.textContent = "";
        recallPrompt.classList.add("hidden");
        contentReview.classList.add("hidden");
        inputBlock.classList.remove("hidden");
        inputHiddenMsg.classList.add("hidden");
        stopTimerBtn.disabled = true;
      }

      updateHistoryInfo(item);
    }

    // 根據 level 算出下一個間隔（分鐘）
    function getIntervalMinutesForLevel(level) {
      // level 從 0 開始
      if (level < BASE_INTERVALS.length) {
        return BASE_INTERVALS[level];
      }
      // 超過基本表後，每次加倍上一個間隔，直到封頂
      const lastBase = BASE_INTERVALS[BASE_INTERVALS.length - 1];
      const extraSteps = level - (BASE_INTERVALS.length - 1);
      let interval = lastBase * Math.pow(2, extraSteps);
      if (interval > MAX_MINUTES) interval = MAX_MINUTES;
      return interval;
    }

    // --- 事件綁定 ---

    // 按下儲存 → 儲存內容＋立即開始第一輪計時
    saveContentBtn.addEventListener("click", () => {
      const content = contentInput.value.trim();
      if (!content) {
        alert("請先輸入要記的內容。");
        return;
      }
      const now = Date.now();

      let item = loadItem() || {};
      item.content = content;
      // 第一次或重設時，從 level 0 開始
      if (typeof item.level !== "number") {
        item.level = 0;
      }
      const intervalMinutes = getIntervalMinutesForLevel(item.level);
      item.nextTime = now + intervalMinutes * 60 * 1000;
      item.lastReviewedAt = now;
      item.lastResult = null;

      saveItem(item);

      saveStatus.textContent =
        "已儲存內容並開始計時。首次間隔約為 " + intervalMinutes + " 分鐘。";
      setTimeout(() => (saveStatus.textContent = ""), 3000);

      // 立刻進入計時狀態，隱藏輸入（避免偷看）
      inputBlock.classList.add("hidden");
      inputHiddenMsg.classList.remove("hidden");
      stopTimerBtn.disabled = false;
      startCountdownUntil(item.nextTime);
    });

    // 手動停止計時（取消本輪）
    stopTimerBtn.addEventListener("click", () => {
      clearTimer();
      timerDisplay.textContent = "--:--";
      statusText.textContent = "計時已停止。你可以修改內容後再按「儲存內容並開始計時」。";
      nextTimeInfo.textContent = "";
      recallPrompt.classList.add("hidden");
      contentReview.classList.add("hidden");
      stopTimerBtn.disabled = true;

      if (currentItem) {
        currentItem.nextTime = null;
        saveItem(currentItem);
      }
      // 重新顯示輸入區
      inputBlock.classList.remove("hidden");
      inputHiddenMsg.classList.add("hidden");
    });

    // 計時完 → 顯示「顯示內容」按鈕
    showContentBtn.addEventListener("click", () => {
      if (!currentItem) return;
      contentDisplay.textContent = currentItem.content || "";
      contentReview.classList.remove("hidden");
    });

    // 回饋：成功記起 → level + 1，間隔拉長（有上限）
    successBtn.addEventListener("click", () => {
      if (!currentItem) return;
      let level = typeof currentItem.level === "number" ? currentItem.level : 0;
      level = level + 1; // 每次成功升一級
      const now = Date.now();
      const intervalMinutes = getIntervalMinutesForLevel(level);

      currentItem.level = level;
      currentItem.lastResult = "success";
      currentItem.lastReviewedAt = now;
      currentItem.nextTime = now + intervalMinutes * 60 * 1000;

      saveItem(currentItem);

      recallPrompt.classList.add("hidden");
      contentReview.classList.add("hidden");

      statusText.textContent =
        "評為「成功記起」。已排程下一次回想。";
      const remaining = currentItem.nextTime - now;
      nextTimeInfo.textContent =
        "下次間隔約為：" +
        intervalMinutes +
        " 分鐘（距離現在約 " +
        formatDuration(remaining) +
        "）。";

      // 下一輪仍然隱藏輸入／答案，只顯示提示與計時
      inputBlock.classList.add("hidden");
      inputHiddenMsg.classList.remove("hidden");
      stopTimerBtn.disabled = false;
      startCountdownUntil(currentItem.nextTime);
    });

    // 回饋：失敗 → level - 1（至少 0），間隔縮短
    failBtn.addEventListener("click", () => {
      if (!currentItem) return;
      let level = typeof currentItem.level === "number" ? currentItem.level : 0;
      level = Math.max(level - 1, 0);
      const now = Date.now();
      const intervalMinutes = getIntervalMinutesForLevel(level);

      currentItem.level = level;
      currentItem.lastResult = "fail";
      currentItem.lastReviewedAt = now;
      currentItem.nextTime = now + intervalMinutes * 60 * 1000;

      saveItem(currentItem);

      recallPrompt.classList.add("hidden");
      contentReview.classList.add("hidden");

      statusText.textContent =
        "評為「沒有或大部分沒記起」。已縮短間隔並排程下一次回想。";
      const remaining = currentItem.nextTime - now;
      nextTimeInfo.textContent =
        "下次間隔約為：" +
        intervalMinutes +
        " 分鐘（距離現在約 " +
        formatDuration(remaining) +
        "）。";

      inputBlock.classList.add("hidden");
      inputHiddenMsg.classList.remove("hidden");
      stopTimerBtn.disabled = false;
      startCountdownUntil(currentItem.nextTime);
    });

    // 初始化
    window.addEventListener("load", () => {
      const item = loadItem();
      if (item) {
        currentItem = item;
      }
      updateUIFromItem();
    });
  </script>
</body>
</html>
